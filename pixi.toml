[workspace]
name        = "zed_ros2_ml_jetson"
version     = "0.1.0"
description = "ZED 2 ROS 2 Wrapper + Lane Segmentation (Jetson Optimized)"
channels    = ["conda-forge", "robostack-staging"]
platforms   = ["linux-aarch64"]

# ── Environment ─────────────────────────────────────────────────
[activation.env]
ROS_DISTRO                     = "humble"
PYTHONDONTWRITEBYTECODE        = "1"
FASTRTPS_DEFAULT_PROFILES_FILE = "shm_disable.xml"
LD_LIBRARY_PATH                = "/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu:$LD_LIBRARY_PATH"

# ── Tasks ───────────────────────────────────────────────────────
[tasks]
run-node = """
bash -c 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu:$LD_LIBRARY_PATH && \
cd /home/mini-dos/ml_laneseg && \
source install/setup.bash && \
ros2 run zed_ml_inference lane_segmentation_node3dlanes'
"""

start-camera = """
bash -c 'cd /home/mini-dos/ml_laneseg && \
source install/setup.bash && \
ros2 launch zed_wrapper zed_camera.launch.py camera_model:=zed2'
"""

start-foxglove = """
bash -c 'cd /home/mini-dos/ml_laneseg && \
source install/setup.bash && \
ros2 launch foxglove_bridge foxglove_bridge_launch.xml'
"""

build = """
bash -c 'cd /home/mini-dos/ml_laneseg && colcon build \
  --symlink-install \
  --packages-select zed_msgs zed_ml_inference \
  --cmake-args \
    -DCMAKE_BUILD_TYPE=Release \
    -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--allow-shlib-undefined" \
    -DCMAKE_EXE_LINKER_FLAGS="-Wl,--allow-shlib-undefined"'
"""

run-all = """
bash -c 'export LD_LIBRARY_PATH=/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu:$LD_LIBRARY_PATH && \
cd /home/mini-dos/ml_laneseg && \
source install/setup.bash && \
ros2 launch zed_wrapper zed_camera.launch.py camera_model:=zed2 & \
sleep 3 && \
ros2 run zed_ml_inference lane_segmentation_node3dlanes & \
sleep 1 && \
ros2 launch foxglove_bridge foxglove_bridge_launch.xml'
"""

# ── Conda / RoboStack dependencies ──────────────────────────────
[dependencies]
python = "3.10.*" 
numpy = "<2" # <--- ADD THIS HERE! Forces Conda to use NumPy 1.x
ros-humble-desktop = "*"
ros-humble-cv-bridge = "*"
ros-humble-sensor-msgs              = "*"
ros-humble-sensor-msgs-py           = "*"   # needed for pc2.read_points / create_cloud
ros-humble-std-msgs                 = "*"
ros-humble-foxglove-bridge          = "*"
ros-humble-visualization-msgs       = "*"
ros-humble-xacro                    = "*"
ros-humble-diagnostic-updater       = "*"
ros-humble-geographic-msgs          = "*"
ros-humble-robot-localization       = "*"
ros-humble-backward-ros             = "*"
colcon-common-extensions            = "*"
cmake                               = "*"

# ── PyPI (Jetson-optimised wheels) ──────────────────────────────
[pypi-options]
extra-index-urls = ["https://pypi.jetson-ai-lab.io/jp6/cu126"]

[pypi-dependencies]
torch = "*"
torchvision = "*"
opencv-python-headless = "*"
scipy = "*"
tqdm = "*"
numpy = "<2.0.0"
thop = "*"
requests = "*"
